name: Daily productivity check

on:
  schedule:
    - cron: "15 18 * * *" # daily at 18:15 UTC (23:45 IST)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get today's date (IST)
        id: date
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from datetime import datetime, time, timezone
          from zoneinfo import ZoneInfo
          
          ist = ZoneInfo("Asia/Kolkata")
          now_ist = datetime.now(ist)
          today = now_ist.date()
          start = datetime.combine(today, time(0, 0, 0), tzinfo=ist).astimezone(timezone.utc)
          end = now_ist.astimezone(timezone.utc)
          
          print(f"TODAY={today.isoformat()}")
          print(f"START_UTC={start.strftime('%Y-%m-%dT%H:%M:%SZ')}")
          print(f"END_UTC={end.strftime('%Y-%m-%dT%H:%M:%SZ')}")
          PY

      - name: Count commits today (all repos)
        id: count
        env:
          USER_PAT: ${{ secrets.USER_PAT }}
          GH_USER: ${{ github.repository_owner }}
        run: |
          if [ -z "$USER_PAT" ]; then
            echo "Missing secret USER_PAT. Add a personal access token (repo scope) as secret USER_PAT." >&2
            exit 1
          fi
          if [ -z "$GH_USER" ]; then
            echo "Missing repository owner to evaluate commit activity." >&2
            exit 1
          fi
          QUERY="author:${GH_USER} committer-date:${START_UTC}..${END_UTC}"
          RESPONSE=$(curl -sS -G \
            -H "Authorization: Bearer $USER_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode "per_page=1" \
            "https://api.github.com/search/commits" \
            -w "\n%{http_code}")
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "GitHub API request failed with status $STATUS." >&2
            echo "$BODY" >&2
            exit 1
          fi
          if ! command -v jq >/dev/null 2>&1; then
            echo "Missing jq; unable to parse GitHub API response." >&2
            exit 1
          fi
          if ! echo "$BODY" | jq -e . >/dev/null; then
            echo "GitHub API response is not valid JSON; cannot determine commit count." >&2
            echo "$BODY" >&2
            exit 1
          fi
          if ! echo "$BODY" | jq -e 'has("total_count")' >/dev/null; then
            echo "GitHub API response missing total_count field; cannot determine commit count." >&2
            echo "$BODY" >&2
            exit 1
          fi
          COUNT=$(echo "$BODY" | jq -r '.total_count')
          if [ "$COUNT" = "null" ]; then
            echo "GitHub API response total_count is null; cannot determine commit count." >&2
            echo "$BODY" >&2
            exit 1
          fi
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]]; then
            echo "GitHub API response returned non-numeric total_count: $COUNT" >&2
            echo "$BODY" >&2
            exit 1
          fi
          echo "commits=$COUNT" >> $GITHUB_OUTPUT
          echo "COUNT=$COUNT" >> $GITHUB_ENV

      - name: Send email reminder if no commits today
        if: steps.count.outputs.commits == '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "No commits yet for ${{ env.TODAY }}"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: "Hey Surya — no commits were detected for ${{ env.TODAY }}. Please push at least one commit."
